# Embedded MediaMTX configuration for OpenMasjid Display.
#
# MediaMTX runs inside the app's container (supervised by the app — see
# server/src/mediamtxServer.ts). It only needs to be an RTSP server with a
# control API on loopback; the app creates/updates every path at runtime via
# that API, so this file stays static (no file-watching needed).
logLevel: info
logDestinations: [stdout]

# Control API — loopback only (the app talks to it on 127.0.0.1; never exposed).
api: yes
apiAddress: 127.0.0.1:9997

# RTSP server. Force TCP: the most compatible, NAT/firewall-friendly transport
# for commodity TV decoder boxes (no UDP port range to publish).
rtsp: yes
rtspTransports: [tcp]
rtspAddress: :8554

# Everything we don't use, off — keep it light on a Raspberry Pi.
rtmp: no
hls: no
webrtc: no
srt: no

# No static paths and no catch-all: only the paths the app explicitly creates
# (timetables, sources, per-screen relays) will serve. Anything else is rejected.
paths: {}
