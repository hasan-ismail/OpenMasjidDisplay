<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="OpenMasjid Display">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2040"/>
      <stop offset="0.55" stop-color="#0A1828"/>
      <stop offset="1" stop-color="#030D1A"/>
    </linearGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="55.25" fill="none" stroke="#7DC8E8" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="128" cy="96" r="92" fill="url(#glow)"/>

  <!-- Broadcast arcs (streaming to screens) -->
  <g fill="none" stroke="#F59E0B" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round">
    <path d="M150 60a40 40 0 0 1 0 56"/>
    <path d="M166 44a64 64 0 0 1 0 88"/>
    <path d="M106 60a40 40 0 0 0 0 56"/>
    <path d="M90 44a64 64 0 0 0 0 88"/>
  </g>

  <!-- Crescent finial -->
  <path d="M128 26c4 0 7.6 1.6 10.2 4.2A14 14 0 0 0 128 54a14 14 0 0 0 10.2-3.6A14.4 14.4 0 0 1 128 26Z" fill="#F59E0B"/>

  <!-- Dome -->
  <path d="M84 132c0-30 19.7-46 44-46s44 16 44 46v6H84v-6Z" fill="url(#dome)"/>

  <!-- Screen / body with mihrab arch -->
  <g>
    <rect x="60" y="138" width="136" height="86" rx="12" fill="#0E1B30"/>
    <rect x="60.75" y="138.75" width="134.5" height="84.5" rx="11.25" fill="none" stroke="#22D3EE" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M110 224v-34a18 18 0 0 1 36 0v34h-36Z" fill="url(#dome)" opacity="0.92"/>
    <!-- small time ticks to read as a clock/timetable -->
    <g fill="#9FACC2" opacity="0.8">
      <rect x="74" y="158" width="22" height="6" rx="3"/>
      <rect x="74" y="174" width="16" height="6" rx="3"/>
      <rect x="160" y="158" width="22" height="6" rx="3"/>
      <rect x="166" y="174" width="16" height="6" rx="3"/>
    </g>
  </g>
</svg>
