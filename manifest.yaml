id: display
name: OpenMasjid Display
tagline: Run prayer timetables, cameras and HDMI on every screen in your masjid — over your network
category: displays
version: 0.34.0
author: OpenMasjid-Solutions
license: AGPL-3.0-only
icon: icon.png
screenshots:
  - screenshots/1.svg
  - screenshots/2.svg
  - screenshots/3.svg
description: |
  **OpenMasjid Display** turns one small computer into the control room for every
  screen in your masjid. Each TV gets its own network video link (RTSP) that you
  point a cheap "RTSP decoder" box at once — then you decide, from your phone or a
  computer, what each screen shows:

  - **Prayer timetables** — beautiful, full-screen prayer clocks calculated on the
    device (no internet needed). Make as many as you like, each with its own colours
    to match the room it hangs in. Shows a large live clock, the Hijri and Gregorian
    dates, every prayer's Adhan **and** Iqamah time, Jumu'ah, and a gentle countdown
    to the next prayer with the current prayer highlighted.
  - **Cameras** — bring in any security/IP camera or an imam camera and put it on a
    screen with one tap (great for overflow rooms and the women's section).
  - **HDMI sources** — plug a laptop or a recording into an HDMI-to-network encoder
    and send it to the screens you choose.

  Set it once and forget it: a weekly **schedule** can switch a screen to a camera
  for Jumu'ah, then back to the timetable afterwards — automatically. Volunteers can
  always take over instantly from the simple mobile page.

  It's designed to be light enough for a Raspberry Pi, a mini-PC, or a Proxmox
  container, and the whole control panel matches the calm OpenMasjidOS look in both
  light and dark.

  **Nothing to fill in here — just install.** When it's running, click **Open** —
  it signs you in with your OpenMasjidOS login and matches your dashboard's light/dark
  look and wallpaper. Then set everything up inside: your masjid details, your screens,
  cameras and schedules. Each screen shows you the exact link to paste into its decoder —
  no network address to look up.
ports:
  - container: 8080
    label: Control panel
  - container: 8081
    label: Volunteer page (mobile)
  - container: 8554
    label: RTSP video for the screens
# OpenMasjidOS Fabric: opt into single sign-on. The platform then issues this app a
# per-app secret at install (OPENMASJID_APP_SECRET) and honours its identity-bound
# /api/auth/session calls, so "Open" signs you in with your OpenMasjidOS login.
# The app still works fully standalone (its own login) when the Fabric is absent.
sso: true
# Opt into Fabric notifications so the app may relay alerts (e.g. "a screen went
# offline") to the masjid's configured webhook via POST /api/fabric/notify. The app
# never sees the webhook URL; it fails soft when notifications aren't enabled.
notifications: true
# Opt into the Fabric "site" capability: GET /api/fabric/site to learn this app's
# PUBLIC URL behind the admin's Cloudflare tunnel, so the website-widget embed code
# can point at a public address. No secrets; fails soft to a LAN link when remote
# access is off.
domain: true
# Serve the CONTROL PANEL over HTTPS. The platform runs a TLS proxy on a dedicated
# port (terminating with the dashboard's cert) in front of the first published port
# (the control panel) and makes "Open" use it. This gives the panel a secure context
# — needed for clipboard (copy the widget embed code) and Secure cookies. The plain
# HTTP port stays published as a legacy fallback, and the volunteer page (the second
# published port) is NOT proxied, so it stays HTTP as intended.
https: true
